<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINE - Encontre o seu atendimento</title>
    <link rel="icon" type="image/png" href="links/favicon.ico">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Foco acessível usando o Laranja da Prefeitura */
        *:focus { outline: 3px solid #f58428; outline-offset: 2px; }
        
        /* Animação suave para o fundo azul */
        .bg-animate {
            background-size: 200% 200%;
            animation: gradientMove 15s ease infinite;
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<!-- Fundo com o Azul #1877F2 e gradiente da paleta oficial -->
<body class="bg-[#1877F2] bg-gradient-to-br from-[#1877F2] via-[#14467C] to-[#1877F2] bg-animate min-h-screen flex flex-col items-center justify-center py-10 px-4 font-sans relative overflow-x-hidden">

    <!-- Efeito de luz difusa laranja ao fundo para compor a paleta -->
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-[#f58428] rounded-full mix-blend-screen filter blur-[100px] opacity-20 fixed z-0"></div>

    <!-- Container Principal (Branco) com a borda superior laranja -->
    <main class="relative my-auto max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden p-6 sm:p-8 z-10 border-t-8 border-[#f58428]">
        
        <!-- Logo com Efeito Instagram -->
        <div class="flex justify-center mb-8 mt-2">
            <!-- 
              rounded-full: Deixa redondo
              object-cover: Garante que a imagem preencha o círculo sem distorcer
              ring / ring-offset: Cria o anel laranja com o espaço branco em volta (Estilo Instagram) 
            -->
            <img src="logo.png" alt="Logotipo do SINE Maceió" class="w-32 h-32 object-cover rounded-full ring-4 ring-[#f58428] ring-offset-4 ring-offset-white drop-shadow-md transition-transform hover:scale-105 duration-500">
        </div>

        <!-- Cabeçalho -->
        <header class="text-center mb-8">
            <h1 class="text-3xl font-black text-[#14467C] mb-1 uppercase tracking-tight">
                SINE - Maceió
            </h1>
        </header>

        <!-- Links -->
        <nav class="space-y-4" aria-label="Links principais">
            
            <!-- Botão 1: Vagas (Laranja SEMTES) -->
            <a href="https://www.online.maceio.al.gov.br/n/talentos/" 
               class="flex items-center justify-center w-full py-4 px-6 bg-[#f58428] text-white font-bold rounded-2xl shadow-lg shadow-[#f58428]/30 hover:shadow-[#f58428]/50 hover:-translate-y-1 hover:bg-[#d9701d] transition-all duration-300 active:scale-95 text-base sm:text-lg">
               Vagas do SINE - Maceió
            </a>

            <!-- Botão 2: WhatsApp (Azul SEMTES para manter a identidade visual) -->
            <a href="https://wa.me/558281488603" target="_blank" rel="noopener noreferrer"
               class="flex items-center justify-center w-full py-4 px-6 bg-[#14467C] text-white font-bold rounded-2xl shadow-lg shadow-[#14467C]/30 hover:shadow-[#14467C]/50 hover:-translate-y-1 hover:bg-[#0f355e] transition-all duration-300 active:scale-95 text-base sm:text-lg"
               aria-label="Entrar em contato com o SINE via WhatsApp">
               Atendimento via WhatsApp
            </a>

            <!-- Linha Divisória para a seção de Empresas -->
            <div class="relative flex py-5 items-center">
                <div class="flex-grow border-t border-slate-200"></div>
                <span class="flex-shrink-0 mx-4 text-[#14467C]/60 text-xs font-bold uppercase tracking-wider">Para Empresas</span>
                <div class="flex-grow border-t border-slate-200"></div>
            </div>

            <!-- Botão 3: Abertura de Vaga (Botões vazados com borda azul e hover laranja) -->
            <a href="https://www.online.maceio.al.gov.br/n/talentos/novavaga" 
               class="flex items-center justify-center w-full py-3.5 px-6 bg-white border-2 border-[#14467C]/20 text-[#14467C] font-bold rounded-2xl shadow-sm hover:border-[#f58428] hover:text-[#f58428] hover:bg-orange-50 hover:-translate-y-1 transition-all duration-300 active:scale-95 text-sm sm:text-base leading-tight">
               <span class="text-center">Deseja abrir uma vaga? <br/><span class="font-bold text-[#f58428] text-xs sm:text-sm">Clique aqui para cadastrar</span></span>
            </a>

            <!-- Botão 4: WhatsApp (Para Empresas) -->
            <a href="https://wa.me/558281488603" 
               class="flex items-center justify-center w-full py-3.5 px-6 bg-white border-2 border-[#14467C]/20 text-[#14467C] font-bold rounded-2xl shadow-sm hover:border-[#f58428] hover:text-[#f58428] hover:bg-orange-50 hover:-translate-y-1 transition-all duration-300 active:scale-95 text-sm sm:text-base leading-tight">
               <span class="text-center">É empresa e quer contato? <br/><span class="font-bold text-[#f58428] text-xs sm:text-sm">Fale conosco pelo WhatsApp</span></span>
            </a>
        </nav>

        <!-- Rodapé -->
        <footer class="mt-10 text-center text-xs font-semibold text-[#14467C]/50 border-t border-slate-100 pt-5">
            © 2026 SEMTES & SINE - Maceió <br/> Desenvolvido para facilitar seu acesso
        </footer>
    </main>

</body>
</html>
